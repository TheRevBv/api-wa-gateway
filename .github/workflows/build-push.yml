name: Build & Push (GHCR)

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.28.2"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build runtime artifacts
        run: pnpm build

      - name: Build Docker image
        run: docker build --tag api-wa-gateway:ci .

  migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: api_wa_gateway_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d api_wa_gateway_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/api_wa_gateway_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm db:migrate

  publish:
    runs-on: ubuntu-latest
    needs:
      - validate
      - migrations

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-dev:
    name: Deploy Dev
    needs:
      - publish
    if: ${{ github.ref == 'refs/heads/develop' }}
    uses: ./.github/workflows/deploy.yml
    with:
      environment_name: dev
      concurrency_group: deploy-dev
      cancel_in_progress: true
      app_dir: ${{ vars.DEV_APP_DIR || '/opt/api-wa-gateway-dev' }}
      image_tag: develop
      healthcheck_url: ${{ vars.DEV_HEALTHCHECK_URL || 'http://127.0.0.1:8001/health' }}
      ssh_port: ${{ vars.DEV_SSH_PORT || '22' }}
      remote_env_file: ${{ vars.DEV_REMOTE_ENV_FILE }}
    secrets:
      VPS_SSH_KEY: ${{ secrets.DEV_SSH_PRIVATE_KEY }}
      VPS_HOST: ${{ secrets.DEV_HOST }}
      VPS_USER: ${{ secrets.DEV_SSH_USER }}
      GHCR_TOKEN: ${{ secrets.DEV_GHCR_TOKEN }}
      GHCR_USER: ${{ secrets.DEV_GHCR_USERNAME }}
