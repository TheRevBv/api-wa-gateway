name: api-wa-gateway

services:
  postgres:
    image: postgres:16-alpine
    container_name: api-wa-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_wa_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_wa_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-wa-gateway-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/api_wa_gateway
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ./baileys-auth:/app/.baileys-auth
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
