name: api-wa-gateway-develop

services:
  app:
    image: ${GHCR_IMAGE:-ghcr.io/therevbv/api-wa-gateway}:${IMAGE_TAG:-develop}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - "${APP_DIR:-/opt/api-wa-gateway-dev}/baileys-auth:/app/.baileys-auth"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
